<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex 用量</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="widget-shell">
      <header class="window-bar">
        <div class="traffic-lights" aria-label="窗口控制">
          <button class="dot red" type="button" data-window-action="close" aria-label="退出" title="退出"></button>
          <button class="dot yellow" type="button" data-window-action="minimize" aria-label="缩小" title="缩小"></button>
          <button class="dot green" type="button" data-window-action="maximize" aria-label="放大" title="放大"></button>
        </div>
        <div class="title-block">
          <p>Codex 实时监控</p>
          <h1>Codex 用量</h1>
        </div>
        <button id="refresh-button" class="refresh-button" type="button" aria-label="刷新数据">&#8635;</button>
      </header>

      <section id="capacity-section" class="section-card" aria-label="容量"></section>
      <section id="tokens-section" class="section-card" aria-label="Token 消耗"></section>
      <section id="task-section" class="section-card" aria-label="当前任务"></section>

      <footer class="footer-line">
        <span id="process-state">检测中</span>
        <span id="updated-at">等待刷新</span>
      </footer>
    </main>
    <script src="app.js"></script>
  </body>
</html>
